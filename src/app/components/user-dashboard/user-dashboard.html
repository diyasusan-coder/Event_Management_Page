<div class="card">

<h2>My Bookings</h2>

<table *ngIf="bookings.length > 0">

<tr>
<th>Customer Name</th>
<th>Event</th>
<th>Action</th>
</tr>

<tr *ngFor="let booking of bookings; let i=index">

<td>{{booking.name}}</td>
<td>{{booking.event}}</td>

<td>
<button (click)="deleteBooking(i)">Delete</button>
</td>

</tr>

</table>

<p *ngIf="bookings.length == 0">
No bookings available
</p>

</div>
